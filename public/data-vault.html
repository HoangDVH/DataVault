<!doctype html>
<html>
  <body>
    <script>
      const worker = new Worker("/worker.js");

      worker.onmessage = (e) => {
        window.parent.postMessage(e.data, "*");
      };

      window.addEventListener("message", (event) => {
        worker.postMessage(event.data);
      });
    </script>
  </body>
</html>
